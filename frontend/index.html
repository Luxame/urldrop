<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urldrop - 社群追蹤碼清理工具</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Cpath d='M30 30h12v25c0 10 6 15 16 15s16-5 16-15V30h12v26c0 18-12 30-28 30s-28-12-28-30V30z' fill='white'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./style.css?v=20260327" />
  </head>
  <body>
    <main class="app">
      <div class="app-header">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 100 100" width="36" height="36" aria-hidden="true">
            <rect width="100" height="100" rx="20" fill="#6366f1"/>
            <path d="M30 30h12v25c0 10 6 15 16 15s16-5 16-15V30h12v26c0 18-12 30-28 30s-28-12-28-30V30z" fill="white"/>
          </svg>
          <h1>Urldrop</h1>
        </div>
        <a
          class="github-link"
          href="https://github.com/Luxame/urldrop"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="前往 Urldrop GitHub 開源專案"
          title="查看 GitHub 開源專案"
        >
          <svg class="github-icon" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          <span>GitHub</span>
        </a>
      </div>

      <p class="subtitle">移除追蹤參數，讓連結更乾淨</p>
      <p class="intro">
        貼上 IG、Threads、X、Facebook 等社群分享連結，自動移除 utm、fbclid、gclid、xmt
        這類追蹤碼，保留最純粹的網址。
      </p>

      <form id="cleanForm" autocomplete="off">
        <label for="inputUrl">貼上原始連結</label>
        <div class="input-wrap">
          <textarea
            id="inputUrl"
            placeholder="https://www.threads.net/@example/post/abc123?xmt=..."
            maxlength="8192"
            spellcheck="false"
          ></textarea>
          <button class="paste-btn" id="pasteBtn" type="button" title="從剪貼簿貼上">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="2" width="6" height="4" rx="1"/>
              <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
              <line x1="9" y1="14" x2="15" y2="14"/>
              <line x1="9" y1="18" x2="12" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="buttons">
          <button class="primary" id="cleanBtn" type="button">
            清除追蹤參數
          </button>
          <button class="neutral" id="clearBtn" type="reset">清空</button>
          <button class="neutral" id="copyBtn" type="button">
            複製整理後連結
          </button>
        </div>

        <section class="result empty" id="result">
          等待輸入連結...
        </section>
        <div class="status" id="status"></div>
      </form>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="footerYear">2026</span> Urldrop &mdash; 社群追蹤碼清理工具</p>
      <p>
        <a
          href="https://github.com/Luxame/urldrop"
          target="_blank"
          rel="noopener noreferrer"
        >GitHub</a>
      </p>
    </footer>

    <script src="./tracking-params.js?v=20260327" defer></script>
    <script src="./cleaner.js?v=20260327" defer></script>
    <script src="./app.js?v=20260327" defer></script>
  </body>
</html>
